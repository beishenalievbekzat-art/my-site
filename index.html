<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Империя Пиццы — Доставка в Бишкеке (Демо)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Империя Пиццы <span>Демо</span></div>
            <nav>
                <a href="#menu">Меню</a>
                <a href="#combo">Комбо</a>
                <a href="#contacts">Контакты</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="menu">
            <h2>Популярные пиццы</h2>
            <div class="pizza-grid">
                <!-- Карточка 1 -->
                <div class="pizza-card">
                    <h3>Пицца "Пепперони"</h3>
                    <p>Пикантные колбаски пепперони, много моцареллы, фирменный томатный соус.</p>
                    <div class="card-bottom">
                        <span class="price">490 сомов</span>
                        <button>В корзину</button>
                    </div>
                </div>

                <!-- Карточка 2 -->
                <div class="pizza-card">
                    <h3>Пицца "Фирменная Империя"</h3>
                    <p>Куриное филе, грибы, ветчина, свежие томаты, соус, сыр моцарелла.</p>
                    <div class="card-bottom">
                        <span class="price">540 сомов</span>
                        <button>В корзину</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
